<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BookBrief - Curated Book Summaries">
    <title>BookBrief | Curated Summaries</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <i class="fa-solid fa-leaf"></i> BookBrief
        </div>
    </header>

    <main class="hero-section">
        <div class="hero-content">
            <h1>Our Curated Library</h1>
            <p>Expertly crafted summaries and key lessons from the world's best books.</p>
        </div>
    </main>

    <section class="results-container container">
        <div id="booksGrid" class="books-grid">
            <!-- Book cards will be injected here by Javascript -->
        </div>
    </section>

    <!-- Suggest a Book Contact Section -->
    <section class="contact-section container">
        <div class="contact-card">
            <h2>Suggest a Book</h2>
            <p>Know a great book? Let us know and we might feature its summary next!</p>
            <a href="https://wa.me/919580617967" target="_blank" rel="noopener noreferrer" class="whatsapp-btn">
                <i class="fa-brands fa-whatsapp"></i> Suggest a Book on WhatsApp
            </a>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 BookBrief. All rights reserved.</p>
        </div>
    </footer>

    <!-- Modal for displaying the full summary -->
    <div id="bookModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-body" id="modalBody">
                <!-- Content will be generated by Javascript -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
